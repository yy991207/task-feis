用于训练教师在校园欺凌事件中的发现、干预和沟通能力\\\"\\n },\\n \\\"stream\\\": true\\n}\\n \\n 返回: {\\n \\\"code\\\": 0,\\n \\\"message\\\": \\\"成功\\\",\\n \\\"data\\\": {\\n \\\"session_id\\\": \\\"1995424326295224320\\\", // 雪花ID\\n \\\"runtime_session_id\\\": \\\"1995424326295224321\\\", // 雪花ID\\n \\\"is_new\\\": true,\\n \\\"status\\\": \\\"generating\\\"\\n }\\n }\",\"operationId\":\"start_session_api_v1_case_simulation_session_start_post\",\"requestBody\":{\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/SessionStartRequest\"}}},\"required\":true},\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/session/regenerate\":{\"post\":{\"tags\":[\"案例仿真\"],\"summary\":\"Regenerate Session\",\"description\":\"老会话重新生成题卡（显式接口，复用幂等逻辑）。\\n\\n2025-12-09: 新增 scene_id 参数，用于获取能力场景配置\",\"operationId\":\"regenerate_session_api_v1_case_simulation_session_regenerate_post\",\"requestBody\":{\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/SessionRegenerateRequest\"}}},\"required\":true},\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/status/{runtime_session_id}\":{\"get\":{\"tags\":[\"案例仿真\"],\"summary\":\"Get Status\",\"description\":\"查询任务生成状态（前端轮询）\\n\\n2025-12-08 ID体系重构：\\n- 路径参数从 task_id 改为 runtime_session_id\\n- runtime_session_id 是雪花ID，同时作为任务唯一标识\\n\\n返回: {\\\"code\\\": 0, \\\"data\\\": {\\\"status\\\": \\\"generating/completed/failed\\\", \\\"progress\\\": 60}}\",\"operationId\":\"get_status_api_v1_case_simulation_status__runtime_session_id__get\",\"parameters\":[{\"name\":\"runtime_session_id\",\"in\":\"path\",\"required\":true,\"schema\":{\"type\":\"string\",\"title\":\"Runtime Session Id\"}}],\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/session/card/{runtime_session_id}\":{\"get\":{\"tags\":[\"案例仿真\"],\"summary\":\"Get Session Card\",\"operationId\":\"get_session_card_api_v1_case_simulation_session_card__runtime_session_id__get\",\"parameters\":[{\"name\":\"runtime_session_id\",\"in\":\"path\",\"required\":true,\"schema\":{\"type\":\"string\",\"title\":\"Runtime Session Id\"}}],\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/review_report/{runtime_session_id}/download\":{\"get\":{\"tags\":[\"案例仿真\"],\"summary\":\"Download Review Report\",\"description\":\"下载案例仿真复盘报告（Word 格式，按需实时生成）。\\n\\n行为说明：\\n- 根据 runtime_session_id 聚合题卡内容与复盘报告；\\n- 按文档约定结构生成 .docx 报告；\\n- 成功时以文件流形式返回，前端可直接触发下载。\",\"operationId\":\"download_review_report_api_v1_case_simulation_review_report__runtime_session_id__download_get\",\"parameters\":[{\"name\":\"runtime_session_id\",\"in\":\"path\",\"required\":true,\"schema\":{\"type\":\"string\",\"title\":\"Runtime Session Id\"}}],\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/simulation/{runtime_session_id}\":{\"get\":{\"tags\":[\"案例仿真\"],\"summary\":\"Get Simulation Detail\",\"description\":\"查询题卡内容（含诊断报告）\\n\\n参数: runtime_session_id - 运行时会话ID（格式: session_user_xxx_thread_generation_xxx）\\n返回: {\\n \\\"code\\\": 0,\\n \\\"data\\\": {\\n \\\"content\\\": {...}, # 题卡内容\\n \\\"answer_history\\\": [...], # 答题历史\\n \\\"is_completed\\\": bool, # 是否完成答题\\n \\\"analysis\\\": {...} # 诊断报告（仅 is_completed=true 时返回）\\n }\\n}\\n\\n2025-11-26: 合并原 /report 接口，答题完成后自动返回诊断报告\",\"operationId\":\"get_simulation_detail_api_v1_case_simulation_simulation__runtime_session_id__get\",\"parameters\":[{\"name\":\"runtime_session_id\",\"in\":\"path\",\"required\":true,\"schema\":{\"type\":\"string\",\"title\":\"Runtime Session Id\"}}],\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/answer\":{\"post\":{\"tags\":[\"案例仿真\"],\"summary\":\"Answer Question\",\"description\":\"提交答案并获取即时反馈\\n请求: {\\\"runtime_session_id\\\": \\\"...\\\", \\\"question_id\\\": 1, \\\"user_answer\\\": [1,2], \\\"custom_value\\\": \\\"...\\\"}\\n返回: {\\\"code\\\": 0, \\\"data\\\": {\\\"is_correct\\\": true, \\\"analysis\\\": \\\"...\\\"}}\",\"operationId\":\"answer_question_api_v1_case_simulation_answer_post\",\"requestBody\":{\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/AnswerSubmitRequest\"}}},\"required\":true},\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/case_simulation/answer/restart/{runtime_session_id}\":{\"post\":{\"tags\":[\"案例仿真\"],\"summary\":\"Restart Answer\",\"description\":\"重新开始答题：清除答题历史，题目保持不变\\n\\n2025-12-09 新增接口\\n\\n用户点击\\\"重新开始\\\"按钮时调用此接口，清空答题历史和诊断报告，\\n