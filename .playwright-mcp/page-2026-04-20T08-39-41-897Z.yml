- generic [ref=e2]: "{\"openapi\":\"3.1.0\",\"info\":{\"title\":\"Document Parse API\",\"description\":\"\\n 文档解析 API 服务\\n\\n 提供异步文档和视频解析服务。用户提交 OSS URL，系统异步解析并存储到向量数据库。\\n\\n ## 功能特性\\n\\n - 支持多种文档格式（PDF、DOCX、PPTX、XLSX、TXT、MD、HTML、CSV）\\n - 支持视频转写（MP4、AVI、MOV、MKV、FLV、WEBM）\\n - 异步处理（基于 Celery）\\n - 任务状态查询\\n - 健康检查\\n \",\"version\":\"v1\"},\"paths\":{\"/api/v1/agent\":{\"post\":{\"tags\":[\"Agent\"],\"summary\":\"Create Agent\",\"description\":\"开通智能体，初始化三个核心记忆文件\\n\\nArgs:\\n user_id: 用户ID\\n agent_name: 智能体名称（可选，默认\\\"小助手\\\"）\\n avatar_url: 头像URL（可选）\",\"operationId\":\"create_agent_api_v1_agent_post\",\"requestBody\":{\"required\":true,\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/CreateUserAgentRequest\"}}}},\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{\"type\":\"object\",\"additionalProperties\":true,\"title\":\"Response Create Agent Api V1 Agent Post\"}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}},\"get\":{\"tags\":[\"Agent\"],\"summary\":\"Get Agent\",\"description\":\"获取智能体完整信息（一次返回所有数据）\\n\\n返回内容：\\n- agent: 智能体配置（agent_name, avatar_url 等）\\n- memories: 所有记忆文件内容（SOUL.md, USER.md, IDENTITY.md）\",\"operationId\":\"get_agent_api_v1_agent_get\",\"parameters\":[{\"name\":\"user_id\",\"in\":\"query\",\"required\":true,\"schema\":{\"type\":\"string\",\"title\":\"User Id\"}}],\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{\"type\":\"object\",\"additionalProperties\":true,\"title\":\"Response Get Agent Api V1 Agent Get\"}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}},\"put\":{\"tags\":[\"Agent\"],\"summary\":\"Update Agent\",\"description\":\"更新智能体（统一接口）\\n\\n传什么更新什么：\\n- agent_name: 更新智能体名称（同步更新 IDENTITY.md）\\n- avatar_url: 更新头像\\n- SOUL_md: 更新底线规则\\n- USER_md: 更新用户信息\\n- IDENTITY_md: 更新身份定义（同步更新 agent_name）\",\"operationId\":\"update_agent_api_v1_agent_put\",\"parameters\":[{\"name\":\"user_id\",\"in\":\"query\",\"required\":true,\"schema\":{\"type\":\"string\",\"title\":\"User Id\"}}],\"requestBody\":{\"required\":true,\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/UpdateAgentRequest\"}}}},\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{\"type\":\"object\",\"additionalProperties\":true,\"title\":\"Response Update Agent Api V1 Agent Put\"}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/agent/files/upload\":{\"post\":{\"tags\":[\"Agent\"],\"summary\":\"Upload File For Agent\",\"description\":\"个人文件上传解析（不调用 Java 回调）\\n\\n流程：\\n1. 前端已将本地文件上传到 Java OSS，拿到 URL\\n2. 调用此接口提交解析任务\\n3. 返回 task_id + resource_id（雪花码），前端轮询 GET /parse/{task_id} 获取结果\\n4. 对话时将返回的 resource_id 和 file_name 放入 uploaded_files 字段\\n\\n特点：\\n- source_type=\\\"personal\\\"，存入 ES 同一索引\\n- skip_callback=True，不回调 Java 服务\\n- resource_id 由后端使用雪花码自动生成，无需前端传入\",\"operationId\":\"upload_file_for_agent_api_v1_agent_files_upload_post\",\"requestBody\":{\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/AgentFileUploadRequest\"}}},\"required\":true},\"responses\":{\"200\":{\"description\":\"Successful Response\",\"content\":{\"application/json\":{\"schema\":{\"additionalProperties\":true,\"type\":\"object\",\"title\":\"Response Upload File For Agent Api V1 Agent Files Upload Post\"}}}},\"422\":{\"description\":\"Validation Error\",\"content\":{\"application/json\":{\"schema\":{\"$ref\":\"#/components/schemas/HTTPValidationError\"}}}}}}},\"/api/v1/agent/tasks\":{\"get\":{\"tags\":[\"Agent\"],\"summary\":\"List Tasks\",\"description\":\"列出用户任务\",\"operatio